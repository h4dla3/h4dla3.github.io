<style>
.card-wrap{display:flex;justify-content:center;align-items:flex-start;padding:16px;background:#dff0fb}
.card{width:100%;max-width:400px;border-radius:22px;overflow:hidden;border:0.5px solid #b8ddf5;background:#fff}
.card-top{background:#1a8fe3;padding:28px 20px 22px;display:flex;flex-direction:column;align-items:center;gap:10px}
.avatar{width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,0.18);border:2px solid rgba(255,255,255,0.35);display:flex;align-items:center;justify-content:center}
.name{color:#fff;font-size:18px;font-weight:500;margin:0;text-align:center}
.role-pill{background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.92);font-size:11px;padding:4px 14px;border-radius:20px;letter-spacing:0.4px}
.contact-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid #eef4fb}
.contact-icon{width:36px;height:36px;border-radius:10px;background:#e8f4fd;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.contact-label{font-size:10px;color:#7ab3d0;letter-spacing:0.4px;margin:0 0 1px}
.contact-val{font-size:13px;color:#0c3d5a;font-weight:500;margin:0;word-break:break-all}
.contact-val a{color:#0c3d5a;text-decoration:none}
.section-label{font-size:10px;color:#7ab3d0;letter-spacing:0.5px;font-weight:500;padding:14px 16px 8px;margin:0}
.social-list{padding:0 16px 16px;display:flex;flex-direction:column;gap:8px}
.social-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;background:#f5fafd;text-decoration:none;border:0.5px solid #e0eff8}
.s-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.s-name{font-size:13px;color:#0c3d5a;font-weight:500;flex:1}
.s-handle{font-size:11px;color:#7ab3d0}
.chev{flex-shrink:0}
@media(max-width:360px){
  .card-top{padding:22px 14px 18px}
  .avatar{width:58px;height:58px}
  .name{font-size:16px}
  .contact-row{padding:10px 12px}
  .social-list{padding:0 12px 12px}
}
</style>
